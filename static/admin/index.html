<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | Service EPGT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

    <script>
      function extractToken() {
        const hash = window.location.hash;
        const match = hash.match(/invite_token=([^&]+)/);
        return match ? match[1] : null;
      }

      document.addEventListener('DOMContentLoaded', () => {
        if (window.netlifyIdentity) {
          const inviteToken = extractToken();

          window.netlifyIdentity.on("init", (user) => {
            if (!user) {
              if (inviteToken) {
                window.netlifyIdentity.acceptInvite({ invite_token: inviteToken })
                  .then(() => {
                    console.log("✅ Invitation acceptée");
                    window.netlifyIdentity.open(); // Ouvre la modale pour finaliser l'inscription
                  })
                  .catch((err) => {
                    console.error("❌ Erreur d’invitation :", err);
                    alert("Erreur lors de l’activation de l’invitation.");
                  });
              } else {
                window.netlifyIdentity.open(); // Ouvre la modale normale
              }
            }
          });

          window.netlifyIdentity.init();
        }
      });
    </script>
  </body>
</html>
