<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | Netlify CMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <!-- Netlify Identity & CMS -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

    <script>
      if (window.netlifyIdentity) {
        // Gérer le token d'invitation depuis l'URL
        const url = new URL(window.location.href);
        const inviteToken = url.hash.match(/invite_token=([^&]+)/);

        window.netlifyIdentity.on("init", (user) => {
          if (!user && inviteToken && inviteToken[1]) {
            window.netlifyIdentity
              .acceptInvite({ invite_token: inviteToken[1] })
              .then(() => {
                console.log("✅ Invitation acceptée. Redirection...");
                window.location.href = "/admin/";
              })
              .catch((err) => {
                console.error("❌ Erreur d'invitation :", err);
              });
          }
        });

        window.netlifyIdentity.init();
      }
    </script>
  </body>
</html>
