<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | Service EPGT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <!-- Chargement de Netlify Identity et CMS -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

    <script>
      // Gestion automatique du lien d'invitation
      const url = new URL(window.location.href);
      const inviteToken = url.hash.match(/invite_token=([^&]+)/);

      if (inviteToken && inviteToken[1]) {
        console.log("Invitation détectée. Traitement en cours...");
        window.netlifyIdentity.acceptInvite({ invite_token: inviteToken[1] })
          .then(() => {
            console.log("Invitation acceptée. Ouverture du widget...");
            window.netlifyIdentity.open();
          })
          .catch((err) => {
            console.error("Erreur lors de l'acceptation de l'invitation :", err);
          });
      }

      // Gestion de l'authentification
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
