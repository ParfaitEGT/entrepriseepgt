<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | Service EPGT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/static/admin/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <!-- Netlify Identity & CMS scripts -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const identity = window.netlifyIdentity;

        if (!identity) {
          console.error("Netlify Identity non chargé.");
          return;
        }

        identity.on("init", (user) => {
          if (!user) {
            // Laisser l'utilisateur choisir entre se connecter ou s'inscrire
            identity.open(); // ouvre la fenêtre avec choix Sign in / Sign up
          } else {
            // Rediriger si déjà connecté
            window.location.href = "/admin/";
          }
        });

        identity.on("login", () => {
          window.location.href = "/admin/";
        });

        // Gérer les invitations (si jamais un lien avec token est utilisé)
        const url = new URL(window.location.href);
        const inviteToken = url.hash.match(/invite_token=([^&]+)/);
        if (inviteToken && inviteToken[1]) {
          identity.acceptInvite({ invite_token: inviteToken[1] })
            .then(() => identity.open())
            .catch((err) => console.error("Erreur d'invitation :", err));
        }

        identity.init();
      });
    </script>
  </body>
</html>
