<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | Service EPGT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/static/admin/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <!-- Netlify Identity & CMS -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const identity = window.netlifyIdentity;

        if (!identity) {
          console.error("Netlify Identity non chargé");
          return;
        }

        identity.on("init", (user) => {
          if (!user) {
            // On vérifie la présence d'un token d'invitation dans l'URL
            const url = new URL(window.location.href);
            const inviteToken = url.hash.match(/invite_token=([^&]+)/);

            if (inviteToken && inviteToken[1]) {
              // Accepter l'invitation automatiquement et ouvrir la modale
              identity.acceptInvite({ invite_token: inviteToken[1] })
                .then(() => identity.open())
                .catch((err) => {
                  console.error("Erreur d’invitation :", err);
                  // Si erreur, on affiche la modale login seulement
                  identity.open("login");
                });
            } else {
              // Pas de token, on affiche que le login (pas d'inscription)
              identity.open("login");
            }
          } else {
            document.location.href = "/admin/";
          }
        });

        identity.on("login", () => {
          document.location.href = "/admin/";
        });

        identity.init();
      });
    </script>
  </body>
</html>
