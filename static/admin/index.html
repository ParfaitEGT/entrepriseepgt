<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | Service EPGT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <!-- Scripts Netlify Identity et Netlify CMS -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            // Ouvre le formulaire d'inscription (signup) au lieu de login
            window.netlifyIdentity.open("signup");

            // Une fois connecté, redirige vers l’admin
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
    <script>
  document.addEventListener("DOMContentLoaded", function () {
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", (user) => {
        if (!user) {
          // Forcer ouverture de la boîte d'inscription si aucun utilisateur
          window.netlifyIdentity.open('signup');
        }
      });

      // Initialisation du widget
      window.netlifyIdentity.init();
    }
  });
    </script>
  </body>
    </html>
