<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | Service EPGT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <!-- Netlify Identity & CMS -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

    <script>
      const url = new URL(window.location.href);
      const inviteTokenMatch = url.hash.match(/invite_token=([^&]+)/);

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user && inviteTokenMatch && inviteTokenMatch[1]) {
            const inviteToken = inviteTokenMatch[1];

            window.netlifyIdentity
              .acceptInvite({ invite_token: inviteToken })
              .then(() => {
                console.log("✅ Invitation acceptée.");
                // Ouvre le modal pour que l'utilisateur définisse un mot de passe
                window.netlifyIdentity.open("signup");
              })
              .catch((err) => {
                console.error("❌ Erreur d’invitation :", err);
              });
          } else if (!user) {
            // Si pas d’invitation, mode normal
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
