<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | EPGT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/static/admin/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            // Afficher la modal avec Login/Sign Up
            window.netlifyIdentity.open(); 
          }
        });

        // Redirection après login
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });

        // Gestion des invitations (si jamais)
        const url = new URL(window.location.href);
        const inviteToken = url.hash.match(/invite_token=([^&]+)/);
        if (inviteToken && inviteToken[1]) {
          window.netlifyIdentity.acceptInvite({ invite_token: inviteToken[1] })
            .then(() => window.netlifyIdentity.open())
            .catch((err) => console.error("Erreur d’invitation :", err));
        }

        // Initialisation
        window.netlifyIdentity.init();
      }
    </script>
  </body>
</html>
