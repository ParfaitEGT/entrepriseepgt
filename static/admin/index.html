<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | Service EPGT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <!-- Chargement des scripts Netlify Identity et CMS -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

    <script>
      function extractInviteToken() {
        const url = new URL(window.location.href);
        const match = url.hash.match(/invite_token=([^&]+)/);
        return match ? match[1] : null;
      }

      document.addEventListener("DOMContentLoaded", function () {
        if (window.netlifyIdentity) {
          const inviteToken = extractInviteToken();

          window.netlifyIdentity.on("init", (user) => {
            if (!user) {
              if (inviteToken) {
                window.netlifyIdentity.acceptInvite({ invite_token: inviteToken })
                  .then(() => window.netlifyIdentity.open())
                  .catch((err) => console.error("Erreur invitation :", err));
              } else {
                // Pas d'invitation, ouvrir formulaire d'inscription
                window.netlifyIdentity.open("signup");
              }
            }
          });

          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });

          window.netlifyIdentity.init();
        }
      });
    </script>
  </body>
</html>
